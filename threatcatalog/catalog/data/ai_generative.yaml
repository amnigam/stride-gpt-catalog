# Generative layer — output/provenance risk (side-branch of the LLM tiers).
- id: GEN-PROV-001
  title: Content provenance / watermarking
  intent: Generated content carries provenance signals (e.g. C2PA).
  guidance: Generated media should carry provenance signals (e.g. C2PA / content credentials) so downstream
    consumers can tell it was AI-produced and detect tampering.
  layers:
  - ai.generative
  stride:
  - Repudiation
  default_expectation: recommended
  assessment_signal: Does generated content carry provenance/watermark signals (C2PA)?
  detect_keywords:
  - c2pa
  - provenance
  - watermark
  - content credentials
  threat_frameworks:
  - framework: cis_v8
    ref: Control 16
    version: '8.1'
- id: GEN-SAFE-001
  title: Harmful-generation filtering
  intent: Generation is filtered for harmful/unsafe content.
  guidance: Generated output should pass through a safety/moderation filter so the system can't be turned
    into a generator of harmful or disallowed content.
  layers:
  - ai.generative
  stride:
  - Tampering
  assessment_signal: Is generated output filtered for harmful/unsafe content?
  detect_keywords:
  - content safety filter
  - generation filtering
  - moderation
  threat_frameworks:
  - framework: cis_v8
    ref: Control 16
    version: '8.1'
