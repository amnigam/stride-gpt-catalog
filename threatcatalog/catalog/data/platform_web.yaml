- id: WEB-WAF-001
  title: Web application firewall
  intent: A WAF fronts the application to filter common web attacks.
  layers: [platform.web]
  stride: [Tampering, DenialOfService]
  assessment_signal: Is a WAF deployed in front of the application (in blocking mode)?
  pci: [{requirement: "6.4.2"}]
  detect_keywords: [waf, web application firewall, aws waf, cloudflare waf]

- id: WEB-CSRF-001
  title: CSRF protection
  intent: State-changing requests are protected against cross-site request forgery.
  layers: [platform.web]
  stride: [Tampering, Spoofing]
  assessment_signal: Are state-changing requests protected with anti-CSRF tokens?
  detect_keywords: [csrf, anti-forgery, samesite]

- id: WEB-SESS-001
  title: Secure session management
  intent: Sessions use secure, HttpOnly, SameSite cookies with sane lifetimes.
  layers: [platform.web]
  stride: [Spoofing]
  assessment_signal: Are sessions managed securely (HttpOnly/Secure/SameSite, rotation, timeout)?
  pci: [{requirement: "8.2.8"}]
  detect_keywords: [secure session, httponly, session timeout, session rotation]

- id: WEB-HDR-001
  title: Security response headers
  intent: CSP, HSTS and related headers harden the browser surface.
  layers: [platform.web]
  stride: [Tampering]
  default_expectation: recommended
  assessment_signal: Are security headers (CSP, HSTS, X-Content-Type-Options) set?
  detect_keywords: [security headers, content security policy, csp, hsts]

- id: WEB-RATE-001
  title: Request rate limiting
  intent: Abusive request volumes are throttled at the edge.
  layers: [platform.web]
  stride: [DenialOfService]
  assessment_signal: Is request rate limiting enforced at the edge/app?
  detect_keywords: [rate limit, throttling, rate-limit]
