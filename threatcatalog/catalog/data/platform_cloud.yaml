# Cloud layer — cloud-hosted workloads (VPC, IAM, KMS, config).
- id: CLD-SEG-001
  title: Network segmentation / VPC boundaries
  intent: Workloads are segmented so a compromise does not flatten the network.
  guidance: Cloud workloads should be split across network boundaries (VPCs, subnets, security zones)
    so that compromising one component doesn't give an attacker a flat, open path to everything else.
  layers:
  - platform.cloud
  stride:
  - ElevationOfPrivilege
  - InformationDisclosure
  assessment_signal: Are workloads segmented across VPC/subnet boundaries with controlled flows?
  pci:
  - requirement: 1.4.1
  detect_keywords:
  - vpc
  - segmentation
  - private subnet
  - network isolation
  threat_frameworks:
  - framework: cis_v8
    ref: Control 12
    version: '8.1'
- id: CLD-KMS-001
  title: Managed key management (KMS)
  intent: Encryption keys are managed and rotated through a KMS.
  guidance: Encryption keys should be created, stored, and rotated through a managed Key Management Service
    rather than living in config or code. The KMS controls who can use a key and leaves an audit trail.
  layers:
  - platform.cloud
  stride:
  - InformationDisclosure
  assessment_signal: Are encryption keys managed/rotated via a KMS?
  pci:
  - requirement: 3.6.1
  detect_keywords:
  - kms
  - key management service
  - key rotation
  threat_frameworks:
  - framework: cis_v8
    ref: Control 3
    version: '8.1'
- id: CLD-IAM-001
  title: Cloud IAM roles (least privilege)
  intent: Cloud compute uses scoped instance/service roles, not long-lived broad keys.
  guidance: Cloud compute (instances, functions, containers) should assume short-lived, scoped IAM roles
    rather than carrying long-lived static access keys. Static keys leak and rarely get rotated.
  layers:
  - platform.cloud
  stride:
  - ElevationOfPrivilege
  assessment_signal: Do cloud workloads use scoped IAM roles rather than broad static credentials?
  pci:
  - requirement: 7.2.1
  detect_keywords:
  - iam role
  - instance role
  - service role
  - assume role
  threat_frameworks:
  - framework: cis_v8
    ref: Control 6
    version: '8.1'
- id: CLD-SG-001
  title: Restrictive security groups
  intent: Inbound/outbound rules are least-exposure by default.
  guidance: Security groups / firewall rules should deny by default and open only what's needed. 'Allow
    0.0.0.0/0 on all ports' is the classic finding here.
  layers:
  - platform.cloud
  stride:
  - ElevationOfPrivilege
  assessment_signal: Are security-group/firewall rules restrictive (deny by default)?
  pci:
  - requirement: 1.3.1
  detect_keywords:
  - security group
  - ingress rules
  - nacl
  - firewall rules
  threat_frameworks:
  - framework: cis_v8
    ref: Control 12
    version: '8.1'
- id: IMMUT-001
  title: Immutable infrastructure
  intent: Hosts are deployed from versioned images and replaced rather than modified in place; no manual
    drift.
  guidance: Instead of logging in to patch a running server (which causes 'works-on-that-box' drift and
    hides tampering), rebuild from a versioned, hardened image and replace it. Immutable, infrastructure-as-code
    deployments make configuration auditable and tampering obvious.
  layers:
  - platform.cloud
  - platform.onprem
  stride:
  - Tampering
  default_expectation: recommended
  assessment_signal: Are hosts deployed from versioned images and replaced (not patched in place) with
    no manual drift?
  threat_frameworks:
  - framework: cis_v8
    ref: Control 4
    version: '8.1'
  pci:
  - requirement: 2.2.1
  detect_keywords:
  - immutable infrastructure
  - golden image
  - infrastructure as code
  - rebuild not patch
  - no drift
  - terraform
