# Base layer — applies to every application regardless of facets.
# PCI requirement IDs are ILLUSTRATIVE seed mappings; verify against PCI DSS v4.0.1.
- id: IAM-SSO-001
  title: Centralized authentication / SSO
  intent: All human access is brokered through a central identity provider (SSO), not per-app local accounts.
  guidance: Users should sign in through the company's central identity provider (e.g. Okta, Entra/Azure
    AD) rather than a username and password unique to this app. Central SSO means joiners/leavers, MFA,
    and lockouts are managed in one place — there are no orphan local accounts to forget about.
  layers:
  - base
  stride:
  - Spoofing
  assessment_signal: Is user authentication handled by a central IdP / SSO rather than local app accounts?
  pci:
  - requirement: 8.3.1
  detect_keywords:
  - sso
  - single sign-on
  - okta
  - saml
  - oidc
  - identity provider
  - azure ad
  - entra
  threat_frameworks:
  - framework: cis_v8
    ref: Control 6
    version: '8.1'
- id: IAM-LPA-001
  title: Least-privilege access (RBAC)
  intent: Access follows least privilege; roles grant only what each actor needs.
  guidance: 'People and services should get only the access their job needs, granted through named roles
    rather than broad ''admin for everyone'' access. Ask: if this account were stolen, how much could
    it reach? Least privilege keeps that blast radius small.'
  layers:
  - base
  stride:
  - ElevationOfPrivilege
  assessment_signal: Are permissions scoped to least privilege via roles (RBAC) rather than broad/shared
    access?
  pci:
  - requirement: 7.2.1
  detect_keywords:
  - least privilege
  - rbac
  - role-based
  - role based access
  threat_frameworks:
  - framework: cis_v8
    ref: Control 6
    version: '8.1'
- id: DATA-ENC-001
  title: Data-at-rest encryption
  intent: Sensitive data is encrypted at rest in databases and object stores.
  guidance: Sensitive data sitting in databases, file stores, and backups should be encrypted so that
    a stolen disk or snapshot is useless without the keys. This is about data at rest; transport encryption
    (TLS) is handled separately.
  layers:
  - base
  stride:
  - InformationDisclosure
  assessment_signal: Is sensitive data encrypted at rest (database/object storage)?
  pci:
  - requirement: 3.5.1
  detect_keywords:
  - encryption at rest
  - encrypted at rest
  - encrypted database
  - kms encryption
  - sse
  threat_frameworks:
  - framework: cis_v8
    ref: Control 3
    version: '8.1'
- id: DATA-TLS-001
  title: Strong transport encryption (TLS 1.2+)
  intent: All data in transit is protected with current TLS.
  guidance: All network traffic — browser-to-server and service-to-service — should travel over current
    TLS (1.2 or, preferably, 1.3) so it can't be read or tampered with in transit. Plain HTTP or outdated
    TLS versions are a finding.
  layers:
  - base
  stride:
  - InformationDisclosure
  - Tampering
  assessment_signal: Is all traffic served over TLS 1.2+ (ideally 1.3)?
  pci:
  - requirement: 4.2.1
  detect_keywords:
  - tls 1.3
  - tls 1.2
  - https everywhere
  - in transit
  threat_frameworks:
  - framework: cis_v8
    ref: Control 3
    version: '8.1'
- id: LOG-AUD-001
  title: Centralized audit logging
  intent: Security-relevant events are logged to a central, tamper-evident store.
  guidance: Security-relevant events (logins, permission changes, admin actions, data access) should be
    written to a central, tamper-evident log store such as a SIEM. Without this you cannot reconstruct
    what happened during an incident.
  layers:
  - base
  stride:
  - Repudiation
  assessment_signal: Are security-relevant events centrally logged (and retained)?
  pci:
  - requirement: 10.2.1
  detect_keywords:
  - audit log
  - centralized logging
  - central logging
  - siem
  - cloudtrail
  threat_frameworks:
  - framework: cis_v8
    ref: Control 8
    version: '8.1'
- id: DATA-CLS-001
  title: Data classification applied
  intent: Data is classified (Public/Internal/Confidential/Restricted) and handled accordingly.
  guidance: Data should be labelled by sensitivity (Public / Internal / Confidential / Restricted) so
    the right protections are applied to the right data. Teams that haven't classified their data usually
    can't say what would be most damaging to lose.
  layers:
  - base
  stride:
  - InformationDisclosure
  default_expectation: recommended
  assessment_signal: Is data classified and are controls applied by classification level?
  detect_keywords:
  - data classification
  - classified data
  - restricted data label
  threat_frameworks:
  - framework: cis_v8
    ref: Control 3
    version: '8.1'
- id: SEC-SECRETS-001
  title: Secrets management
  intent: API keys and credentials live in a secrets manager, never in client code or source.
  guidance: API keys, database passwords, and tokens belong in a managed secrets vault (e.g. AWS Secrets
    Manager, HashiCorp Vault), never hard-coded in source, config files, or shipped to the client. Ideally
    they are rotated automatically.
  layers:
  - base
  stride:
  - InformationDisclosure
  - Spoofing
  assessment_signal: Are secrets stored in a managed secrets vault rather than code/config/client-side?
  pci:
  - requirement: 8.6.2
  detect_keywords:
  - secrets manager
  - vault
  - parameter store
  - kms secret
  threat_frameworks:
  - framework: cis_v8
    ref: Control 6
    version: '8.1'
- id: IN-VAL-001
  title: Input validation and output encoding
  intent: Untrusted input is validated and output is encoded to prevent injection.
  guidance: 'Treat anything coming from a user or another system as untrusted: validate it on the way
    in and encode it on the way out, and use parameterized queries. This is the core defense against injection
    (SQL, XSS, command injection).'
  layers:
  - base
  stride:
  - Tampering
  assessment_signal: Is untrusted input validated and output encoded (injection defenses)?
  pci:
  - requirement: 6.2.4
  detect_keywords:
  - input validation
  - sanitization
  - output encoding
  - parameterized queries
  threat_frameworks:
  - framework: cis_v8
    ref: Control 16
    version: '8.1'
- id: SCA-SBOM-001
  title: Software composition analysis & SBOM
  intent: Third-party and open-source dependencies are inventoried (SBOM) and scanned for known-vulnerable
    components.
  guidance: Most code in a modern app is someone else's. Generate a Software Bill of Materials and run
    software-composition analysis so a newly-disclosed CVE in a library you depend on is something you
    find, not something an attacker finds first.
  layers:
  - base
  stride:
  - Tampering
  - InformationDisclosure
  assessment_signal: Are dependencies inventoried (SBOM) and continuously scanned for known-vulnerable
    components (SCA)?
  threat_frameworks:
  - framework: cis_v8
    ref: Control 2
    version: '8.1'
  pci:
  - requirement: 6.3.2
  detect_keywords:
  - sca
  - sbom
  - dependency scanning
  - software composition
  - vulnerable components
  - snyk
  - dependabot
