# Mobile layer — OWASP MASVS + OWASP Mobile Top 10 2024.
- id: MOB-STORE-001
  title: Secure local storage
  intent: Sensitive data on device uses the platform keystore, never plaintext.
  guidance: Sensitive data on a device should live in the platform's secure keystore/keychain (hardware-backed
    where available), never in plaintext files, shared preferences, or logs that another app or a stolen
    phone could read.
  layers:
  - platform.mobile
  stride:
  - InformationDisclosure
  assessment_signal: Is on-device sensitive data stored in the secure keystore/keychain?
  threat_frameworks:
  - framework: owasp_masvs
    ref: MASVS-STORAGE
    version: 2.x
  - framework: owasp_mobile
    ref: M9:2024
    version: '2024'
  - framework: cis_v8
    ref: Control 3
    version: '8.1'
  detect_keywords:
  - keychain
  - keystore
  - secure storage
  - encrypted shared prefs
- id: MOB-PIN-001
  title: Certificate pinning
  intent: The app pins server certificates to resist MITM.
  guidance: The mobile app should pin the server's certificate or public key so that a man-in-the-middle
    using a rogue/installed CA certificate can't silently intercept traffic.
  layers:
  - platform.mobile
  stride:
  - Spoofing
  - Tampering
  default_expectation: recommended
  assessment_signal: Does the app pin the server certificate/public key?
  threat_frameworks:
  - framework: owasp_masvs
    ref: MASVS-NETWORK
    version: 2.x
  - framework: owasp_mobile
    ref: M5:2024
    version: '2024'
  - framework: cis_v8
    ref: Control 12
    version: '8.1'
  detect_keywords:
  - certificate pinning
  - cert pinning
  - public key pinning
- id: MOB-RASP-001
  title: Runtime self-protection & binary hardening
  intent: The app resists tampering, reverse-engineering and hooking, and checks its own runtime integrity.
  guidance: 'For apps handling sensitive operations, make the binary hard to tamper with: obfuscation,
    anti-hooking, and root/jailbreak and integrity checks (RASP). It raises the bar against repackaged
    or instrumented copies of your app.'
  layers:
  - platform.mobile
  stride:
  - Tampering
  default_expectation: recommended
  assessment_signal: Does the app include binary hardening / runtime self-protection (anti-tamper, root/jailbreak
    & integrity checks)?
  threat_frameworks:
  - framework: owasp_mobile
    ref: M7:2024
    version: '2024'
  - framework: owasp_masvs
    ref: MASVS-RESILIENCE
    version: 2.x
  - framework: cis_v8
    ref: Control 16
    version: '8.1'
  detect_keywords:
  - rasp
  - anti-tamper
  - root detection
  - jailbreak detection
  - obfuscation
  - binary protection
  - integrity check
