# MCP layer — OWASP MCP Top 10 (BETA; pin version, expect drift).
- id: MCP-TRUST-001
  title: MCP server provenance / trust verification
  intent: Only verified, provenance-checked MCP servers are connected.
  guidance: Only connect Model Context Protocol servers whose provenance and integrity you've verified.
    An untrusted MCP server is code you've invited inside your tool-calling loop.
  layers:
  - ai.mcp
  stride:
  - Spoofing
  - Tampering
  assessment_signal: Are connected MCP servers verified for provenance/trust before use?
  threat_frameworks:
  - framework: owasp_mcp
    ref: MCP01:2025
    version: beta-phase3
  - framework: cis_v8
    ref: Control 15
    version: '8.1'
  detect_keywords:
  - mcp server verification
  - trusted mcp
  - server provenance
- id: MCP-TOKEN-001
  title: No token passthrough; scoped credentials
  intent: Per-server scoped credentials are used; tokens are not passed through.
  guidance: Give each MCP server its own scoped credentials; never pass the user's token straight through.
    Token passthrough lets one server act with far more authority than it should.
  layers:
  - ai.mcp
  stride:
  - ElevationOfPrivilege
  - InformationDisclosure
  assessment_signal: Are MCP credentials scoped per-server with no token passthrough?
  threat_frameworks:
  - framework: owasp_mcp
    ref: MCP05:2025
    version: beta-phase3
  - framework: cis_v8
    ref: Control 6
    version: '8.1'
  detect_keywords:
  - token passthrough
  - scoped token
  - per-server credential
- id: MCP-DESC-001
  title: Tool-description injection defense
  intent: Tool descriptions/metadata are sanitized to resist tool poisoning.
  guidance: Sanitize MCP tool descriptions/metadata — a malicious description can itself carry instructions
    that poison the model ('tool poisoning'). Don't trust server-supplied text blindly.
  layers:
  - ai.mcp
  stride:
  - Tampering
  assessment_signal: Are MCP tool descriptions/metadata sanitized against injection (tool poisoning)?
  threat_frameworks:
  - framework: owasp_mcp
    ref: MCP03:2025
    version: beta-phase3
  - framework: cis_v8
    ref: Control 16
    version: '8.1'
  detect_keywords:
  - tool description injection
  - tool poisoning
  - metadata sanitization
- id: MCP-LOG-001
  title: MCP call audit logging
  intent: MCP tool calls are logged for audit.
  guidance: Log MCP tool calls to your audit pipeline so you can see what the model invoked, with what
    arguments, and when.
  layers:
  - ai.mcp
  stride:
  - Repudiation
  assessment_signal: Are MCP tool calls logged to the audit pipeline?
  detect_keywords:
  - mcp logging
  - mcp audit
  threat_frameworks:
  - framework: cis_v8
    ref: Control 8
    version: '8.1'
